// build.gradle — Android library module for @pyrx/synapse-react-native.
//
// What this builds
// ----------------
// A thin AAR exposing one TurboModule (`PyrxSynapseModule`) that
// forwards JS calls into the published `tech.pyrx.synapse:synapse-core`
// + `:synapse-push` SDKs from Maven Central. The wrapper itself does
// NO event-pipeline / queue / network work — every call delegates.
//
// Dependency strategy
// -------------------
// We pin the SDK to the 0.1.4+ range (the version that added the
// public observer surface — `Pyrx.events: SharedFlow<PyrxEvent>` —
// landed in Phase 9.2.1 PR-2, tracked at pyrx-synapse-android#20).
//
// `0.1.4+` is Gradle's "dynamic version" syntax: it accepts every 0.1.x
// patch from 0.1.4 onward (0.1.4, 0.1.5, ...). Customers benefit from
// bug-fix releases automatically when they `./gradlew --refresh-dependencies`.
//
// Why 0.1.4 specifically (and not the previous 0.1.3 floor): the
// PyrxSynapseModule.kt at this wrapper's version COLLECTS from
// `Pyrx.events` (the SharedFlow) to forward native events into RN's
// `RCTDeviceEventEmitter`. That collect would fail to compile against
// 0.1.3 (no observer API existed yet) and would silently misbehave if
// a customer's gradle resolved 0.1.3 through a separate transitive pin.
// The strict floor protects them.
//
// When the underlying SDK bumps to 0.2.x, this wrapper bumps to 0.3.0
// and tightens the pin to "[0.2, 0.3)".
//
// Note for the New Architecture
// -----------------------------
// We apply the `com.facebook.react` plugin (RN 0.76+ requires it for
// every native module) which:
//   - Generates the C++/Kotlin bindings from src/NativePyrxSynapse.ts
//     during the example app's build (NOT here — the codegen runs in
//     the host app's Gradle build).
//   - Provides the `NativePyrxSynapseSpec` abstract class our
//     `PyrxSynapseModule.kt` extends.
//
// JDK 17 is required by RN 0.76+ and AGP 8.2+.

buildscript {
  ext.PyrxSynapseRN = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return PyrxSynapseRN[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

android {
  namespace "com.pyrx.synapse"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  implementation "com.facebook.react:react-android"

  // Published PYRX Synapse Android SDK from Maven Central. The 0.1.4 pin
  // is the floor — the version that landed the public observer
  // SharedFlow used by PyrxSynapseModule.kt's event-forwarding collect.
  // Bump the floor when this wrapper adopts a new native SDK feature.
  implementation "tech.pyrx.synapse:synapse-core:0.1.4+"
  implementation "tech.pyrx.synapse:synapse-push:0.1.4+"
}
