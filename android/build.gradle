// build.gradle — Android library module for @pyrx/synapse-react-native.
//
// What this builds
// ----------------
// A thin AAR exposing one TurboModule (`PyrxSynapseModule`) that
// forwards JS calls into the published `tech.pyrx.synapse:synapse-core`
// + `:synapse-push` SDKs from Maven Central. The wrapper itself does
// NO event-pipeline / queue / network work — every call delegates.
//
// Dependency strategy
// -------------------
// We pin the SDK to >= 0.1.3 (the version that added
// `PyrxConfig.sdkVariant` — see pyrx-synapse-android#17) and let Gradle
// resolve the latest 0.1.x or 0.2.x. We deliberately do NOT pin to a
// single version: the SDK ships frequent bug-fix releases and customers
// benefit from those when they `./gradlew --refresh-dependencies`.
//
// When the underlying SDK bumps to 1.0, this wrapper bumps to 1.0 too
// and tightens the pin to "[1.0, 2.0)".
//
// Note for the New Architecture
// -----------------------------
// We apply the `com.facebook.react` plugin (RN 0.76+ requires it for
// every native module) which:
//   - Generates the C++/Kotlin bindings from src/NativePyrxSynapse.ts
//     during the example app's build (NOT here — the codegen runs in
//     the host app's Gradle build).
//   - Provides the `NativePyrxSynapseSpec` abstract class our
//     `PyrxSynapseModule.kt` extends.
//
// JDK 17 is required by RN 0.76+ and AGP 8.2+.

buildscript {
  ext.PyrxSynapseRN = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return PyrxSynapseRN[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

android {
  namespace "com.pyrx.synapse"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  implementation "com.facebook.react:react-android"

  // Published PYRX Synapse Android SDK from Maven Central. The 0.1.3 pin
  // is the floor — anything 0.1.x or 0.2.x is accepted. Bump the floor
  // when this wrapper adopts a new native SDK feature.
  implementation "tech.pyrx.synapse:synapse-core:0.1.3+"
  implementation "tech.pyrx.synapse:synapse-push:0.1.3+"
}
